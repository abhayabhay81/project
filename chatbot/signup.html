<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Sign Up For Chat Bot</h2>
        <form id="signup-form" class="login-form">
            <input type="text" id="signup-username" placeholder="Username" required />
            <input type="email" id="signup-email" placeholder="Email" required />
            <input type="password" id="signup-password" placeholder="Password" required />
            <button type="submit">Sign Up</button>
        </form>
        <div id="signup-error" style="color:red;display:none;margin-top:10px;"></div>
        <div id="toggle-link" style="margin-top:16px;">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
    <script>
        let users = [
            { username: 'customer', password: 'customer123', role: 'customer', email: 'customer@example.com' },
            { username: 'admin', password: 'admin123', role: 'admin', email: 'admin@example.com' }
        ];
        if (localStorage.getItem('chatbot_users')) {
            try {
                users = JSON.parse(localStorage.getItem('chatbot_users'));
            } catch {}
        }
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            if (users.some(u => u.username === username)) {
                document.getElementById('signup-error').style.display = 'block';
                document.getElementById('signup-error').textContent = 'Username already exists.';
                return;
            }
            if (users.some(u => u.email === email)) {
                document.getElementById('signup-error').style.display = 'block';
                document.getElementById('signup-error').textContent = 'Email already registered.';
                return;
            }
            const newUser = { username, email, password, role: 'customer' };
            users.push(newUser);
            localStorage.setItem('chatbot_users', JSON.stringify(users));
            localStorage.setItem('chatbot_username', username);
            localStorage.setItem('chatbot_role', 'customer');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
