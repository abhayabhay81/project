<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2 id="form-title">Login For Chat Bot</h2>
        <!-- Login Form -->
        <form id="login-form" class="login-form">
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        
        <div id="login-error" style="color:red;display:none;margin-top:10px;"></div>
        <div id="toggle-link" style="margin-top:16px;">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>
    <script>
        // Demo users for authentication
        let users = [
            { username: 'customer', password: 'customer123', role: 'customer', email: 'customer@example.com' },
            { username: 'admin', password: 'admin123', role: 'admin', email: 'admin@example.com' }
        ];
        // Load users from localStorage if available
        if (localStorage.getItem('chatbot_users')) {
            try {
                users = JSON.parse(localStorage.getItem('chatbot_users'));
            } catch {}
        }

        // Login logic
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                localStorage.setItem('chatbot_username', user.username);
                localStorage.setItem('chatbot_role', user.role);
                window.location.href = 'index.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').textContent = 'Invalid username or password.';
            }
        });

    </script>
</body>
</html>
